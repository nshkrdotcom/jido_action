name: Specs

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check Specs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Install dependencies
        run: mix deps.get

      - name: Refresh base branch reference
        run: git fetch --no-tags origin "${{ github.base_ref }}" --depth=1

      - name: Check specs
        # covers: jido_action.package.spec_pr_gate
        run: mix spec.check --base "origin/${{ github.base_ref }}"
